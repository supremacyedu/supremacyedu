<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supremacy Edu - Referrer Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="auth-card" id="login-section">
        <h2>Referrer Login</h2>
        <p>Access your dashboard and track commissions.</p>
        <form id="login-form">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email Address" required />
            </div>
            <div class="input-group" style="margin-bottom: 8px;">
                <input type="password" id="loginPassword" placeholder="Password" required />
            </div>
            <a href="#" id="show-forgot-pwd" class="forgot-pwd-link">Forgot Password?</a>
            
            <button type="submit" class="primary-btn">Login</button>
        </form>
        <div class="auth-link-container">
            Don't have an account? <a href="ref-signup.html">Sign up</a>
        </div>
    </div>

    <div class="auth-card" id="forgot-pwd-section" style="display: none;">
        <h2>Reset Password</h2>
        <p id="reset-desc">Enter your email to receive a recovery OTP.</p>
        
        <form id="request-reset-form">
            <div class="input-group">
                <input type="email" id="resetEmail" placeholder="Enter your Email" required />
            </div>
            <button type="submit" class="primary-btn">Send Reset OTP</button>
            <div class="auth-link-container">
                <a href="#" id="back-to-login" style="margin-left: 0;">Back to Login</a>
            </div>
        </form>

        <form id="new-pwd-form" style="display: none;">
            <div class="input-group">
                <input type="text" id="resetOtp" placeholder="Enter 6-digit OTP" required />
            </div>
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="New Password" required />
            </div>
            <button type="submit" class="primary-btn">Update Password</button>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://dlszqasvqubjujkowrtl.supabase.co';
        const supabaseKey = 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // --- Standard Login ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value,
            });

            if (error) {
                alert(error.message);
                return;
            }
            window.location.href = 'ref-dashboard.html';
        });

        // --- Navigation Toggles ---
        document.getElementById('show-forgot-pwd').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('forgot-pwd-section').style.display = 'block';
        });

        document.getElementById('back-to-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('forgot-pwd-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });

        // --- Forgot Password: Step 1 (Send OTP) ---
        let resetEmailAddress = '';
        document.getElementById('request-reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            resetEmailAddress = document.getElementById('resetEmail').value;
            
            const { error } = await supabase.auth.resetPasswordForEmail(resetEmailAddress);
            if (error) {
                alert(error.message);
                return;
            }
            
            document.getElementById('reset-desc').innerText = "Enter the 6-digit OTP sent to your email and your new password.";
            document.getElementById('request-reset-form').style.display = 'none';
            document.getElementById('new-pwd-form').style.display = 'block';
        });

        // --- Forgot Password: Step 2 (Verify & Update) ---
        document.getElementById('new-pwd-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('resetOtp').value;
            const newPassword = document.getElementById('newPassword').value;

            // Verify OTP
            const { data: sessionData, error: verifyError } = await supabase.auth.verifyOtp({
                email: resetEmailAddress,
                token: otp,
                type: 'recovery'
            });

            if (verifyError) {
                alert(verifyError.message);
                return;
            }

            // Update Password
            const { error: updateError } = await supabase.auth.updateUser({
                password: newPassword
            });

            if (updateError) {
        alert(updateError.message);
        return;
    }

    // Success! Show themed confirmation, then reload
    const forgotPwdSection = document.getElementById('forgot-pwd-section');
    forgotPwdSection.innerHTML = `
        <div style="text-align: center; padding: 20px 0; animation: slideUpFade 0.5s forwards;">
            <div style="background: rgba(74, 222, 128, 0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 style="color: white; margin-bottom: 10px; font-size: 24px;">Password Secured!</h2>
            <p style="color: var(--text-muted);">Your password has been successfully updated. Redirecting...</p>
        </div>
    `;

    setTimeout(() => {
        window.location.href = 'ref-login.html'; 
    }, 2000); 
        });
    </script>
</body>
</html>
