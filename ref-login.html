<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supremacy Edu - Referrer Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="auth-card" id="login-section">
        <h2 style="text-align: center;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">Log in to your referrer dashboard.</p>
        
        <form id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" placeholder="Email Address" required />
            </div>
            
            <div class="input-group" style="position: relative;">
                <input type="password" id="login-password" placeholder="Password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;" />
                <button type="button" onclick="togglePassword('login-password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">
                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
            
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" id="show-forgot-btn" style="color: var(--primary); font-size: 13px; text-decoration: none;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="primary-btn" style="width: 100%;">Log In</button>
        </form>
        
        <div class="auth-link-container" style="text-align: center; margin-top: 20px; font-size: 14px;">
            <span style="color: var(--text-muted);">Don't have an account?</span> <a href="ref-signup.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">Sign up</a>
        </div>
    </div>

    <div class="auth-card" id="request-reset-section" style="display: none;">
        <h2 style="text-align: center;">Reset Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px;">Enter your email to receive an 8-digit recovery code.</p>
        
        <form id="request-reset-form">
            <div class="input-group">
                <input type="email" id="reset-email" placeholder="Email Address" required />
            </div>
            <button type="submit" class="primary-btn" style="width: 100%; margin-bottom: 15px;">Send Recovery Code</button>
            
            <button type="button" id="back-to-login-btn" style="background: transparent; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; gap: 8px; padding: 10px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Login
            </button>
        </form>
    </div>

    <div class="auth-card" id="verify-reset-section" style="display: none;">
        <h2 style="text-align: center;">Secure Account</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Code sent to <br><strong id="display-reset-email" style="color: var(--primary);">email</strong></p>
        
        <form id="verify-reset-form">
            <div class="input-group">
                <input type="text" id="reset-otp" placeholder="00000000" required maxlength="8" style="text-align: center; font-size: 20px; letter-spacing: 6px; font-weight: bold;" />
            </div>
            
            <div class="input-group" style="position: relative;">
                <input type="password" id="new-password" placeholder="Enter New Password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;" />
                <button type="button" onclick="togglePassword('new-password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">
                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>

            <button type="submit" class="primary-btn" style="width: 100%; margin-top: 10px;">Update Password</button>
            
            <div style="text-align: center; margin-top: 20px; font-size: 14px;">
                <span style="color: var(--text-muted);">Didn't receive the code?</span> 
                <button type="button" id="resend-reset-otp-btn" style="background: transparent; border: none; color: var(--primary); font-weight: bold; cursor: pointer; padding: 0; font-size: 14px; margin-left: 5px;">Resend OTP</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        
        // --- SECURE CONFIGURATION ---
        const supabaseUrl = 'https://dlszqasvqubjujkowrtl.supabase.co';
        const supabaseKey = 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let userResetEmail = '';
        let resendTimer = null;

        // --- PASSWORD VISIBILITY TOGGLE ---
        window.togglePassword = function(inputId, btnElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btnElement.style.color = 'var(--primary)';
                btnElement.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                input.type = 'password';
                btnElement.style.color = 'var(--text-muted)';
                btnElement.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            }
        };

        // --- NAVIGATION TOGGLES ---
        document.getElementById('show-forgot-btn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('request-reset-section').style.display = 'block';
        });

        document.getElementById('back-to-login-btn').addEventListener('click', () => {
            document.getElementById('request-reset-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        });

        // --- 1. STANDARD LOGIN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Login Failed: " + error.message);
                return;
            }
            
            // Success - Route to Dashboard
            window.location.replace('ref-dashboard.html');
        });

        // --- 2. REQUEST RECOVERY OTP ---
        document.getElementById('request-reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            userResetEmail = document.getElementById('reset-email').value.trim();

            const { error } = await supabase.auth.resetPasswordForEmail(userResetEmail);

            if (error) {
                alert("Failed to send OTP: " + error.message);
                return;
            }

            // Show OTP Input Screen
            document.getElementById('display-reset-email').innerText = userResetEmail;
            document.getElementById('request-reset-section').style.display = 'none';
            document.getElementById('verify-reset-section').style.display = 'block';
        });

        // --- RESEND RECOVERY OTP (With 60s Cooldown) ---
        document.getElementById('resend-reset-otp-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const resendBtn = document.getElementById('resend-reset-otp-btn');
            
            // Disable button so they can't spam it
            resendBtn.disabled = true;
            resendBtn.style.color = 'var(--text-muted)';
            resendBtn.innerText = "Sending...";

            // Ask Supabase to send a fresh code
            const { error } = await supabase.auth.resetPasswordForEmail(userResetEmail);

            if (error) {
                alert("Failed to resend OTP: " + error.message);
                resendBtn.disabled = false;
                resendBtn.style.color = 'var(--primary)';
                resendBtn.innerText = "Resend OTP";
                return;
            }

            // Start a 60-second visual countdown
            let timeLeft = 60;
            if (resendTimer) clearInterval(resendTimer);
            
            resendTimer = setInterval(() => {
                resendBtn.innerText = `Wait ${timeLeft}s`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(resendTimer);
                    resendBtn.disabled = false;
                    resendBtn.style.color = 'var(--primary)';
                    resendBtn.innerText = "Resend OTP";
                }
            }, 1000);
        });

        // --- 3. VERIFY OTP & UPDATE PASSWORD ---
        document.getElementById('verify-reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('reset-otp').value.trim();
            const newPassword = document.getElementById('new-password').value;

            // Step A: Verify the OTP (Type MUST be 'recovery')
            const { data: sessionData, error: verifyError } = await supabase.auth.verifyOtp({
                email: userResetEmail,
                token: otp,
                type: 'recovery'
            });

            if (verifyError) {
                alert("Invalid or Expired OTP: " + verifyError.message);
                return;
            }

            // Step B: Now that we have a temporary session, update the password
            const { error: updateError } = await supabase.auth.updateUser({
                password: newPassword
            });

            if (updateError) {
                alert("Failed to secure new password: " + updateError.message);
                return;
            }

            // Step C: Success UI Animation
            const section = document.getElementById('verify-reset-section');
            section.innerHTML = `
                <div style="text-align: center; padding: 20px 0; animation: slideUpFade 0.5s forwards;">
                    <div style="background: rgba(74, 222, 128, 0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <h2 style="color: white; margin-bottom: 10px; font-size: 24px;">Password Secured!</h2>
                    <p style="color: var(--text-muted);">Your password has been updated successfully. Redirecting to your dashboard...</p>
                </div>
            `;

            // Wait 2 seconds, then send them straight to the dashboard!
            setTimeout(() => {
                window.location.replace('ref-dashboard.html');
            }, 2000);
        });
    </script>
</body>
</html>
