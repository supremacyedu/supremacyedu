<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supremacy Edu - Portal Login</title>
    <link rel="icon" type="image/png" href="src/logo_.png">
    <meta name="Join Supremacy Edu's referral program and earn payouts by helping students find the best educational institute" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="login-card">
        <a href="index.html" class="back-btn" style="margin-bottom: 25px;">&larr; Back to Website</a>

        <h2>Portal Login</h2>
        
        <div class="role-toggle">
            <input type="radio" id="role-referrer" name="role" value="referrer" checked onchange="toggleForms()">
            <input type="radio" id="role-rde" name="role" value="rde" onchange="toggleForms()">
            <div class="slider"></div>
            <label for="role-referrer" class="label-referrer">Referrer</label>
            <label for="role-rde" class="label-rde">RDE</label>
        </div>

        <div id="referrer-fields">
            <div class="input-group"><input type="email" id="ref-email" placeholder="Email Address"></div>
            <div class="input-group"><input type="password" id="ref-password" placeholder="Password"></div>
        </div>

        <div id="rde-fields" style="display: none;">
            <div class="input-group"><input type="text" id="rde-code" placeholder="RDE Code (e.g. RDE001A)"></div>
            <div class="input-group"><input type="tel" id="rde-phone" placeholder="Phone Number"></div>
            <div class="input-group"><input type="password" id="rde-password" placeholder="Password"></div>
        </div>

        <button type="button" class="primary-btn" onclick="handleLogin(event)">Login</button>
        
        <div id="message" style="margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none;"></div>
        
        <div class="login-link" id="signup-div">
            Don't have an account? <a href="signup.html">Sign up here</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabaseUrl = 'https://dlszqasvqubjujkowrtl.supabase.co'; 
        const supabaseAnonKey = 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        window.toggleForms = () => {
            const isRde = document.getElementById('role-rde').checked;
            document.getElementById('referrer-fields').style.display = isRde ? 'none' : 'block';
            document.getElementById('rde-fields').style.display = isRde ? 'block' : 'none';
            document.getElementById('signup-div').style.display = isRde ? 'none' : 'block';
            document.getElementById('message').style.display = "none"; 
        };

        window.handleLogin = async (event) => {
            event.preventDefault();
            const role = document.querySelector('input[name="role"]:checked').value;
            const msg = document.getElementById('message');
            msg.style.display = "block";
            msg.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
            msg.style.color = "#38bdf8"; 
            msg.innerText = "Authenticating...";

            try {
                if (role === 'referrer') {
                    const email = document.getElementById('ref-email').value.trim();
                    const password = document.getElementById('ref-password').value;

                    if (!email || !password) throw new Error("Please enter your email and password.");

                    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });
                    if (authError) throw new Error("Invalid email or password.");

                    const { data: profile, error: profileError } = await supabase
                        .from('users')
                        .select('id, payment_status')
                        .eq('id', authData.user.id)
                        .single();

                    if (profileError || !profile) {
                        await supabase.auth.signOut();
                        throw new Error("Referrer profile not found. Please sign up first.");
                    }

                    msg.style.backgroundColor = "rgba(74, 222, 128, 0.1)";
                    msg.style.color = "#4ade80"; 
                    msg.innerText = "Login successful!";
                    window.location.href = "dashboard.html"; 

                } else if (role === 'rde') {
                    const cleanCode = document.getElementById('rde-code').value.trim();
                    const cleanPhone = String(document.getElementById('rde-phone').value).replace(/\s+/g, '');
                    const cleanPass = String(document.getElementById('rde-password').value).trim();

                    if (!cleanCode || !cleanPhone || !cleanPass) throw new Error("Please fill all RDE fields.");

                    const { data: allowedData } = await supabase.from('allowed_rdes').select('*').ilike('rde_code', cleanCode).single();
                    if (!allowedData) throw new Error(`RDE Code "${cleanCode}" not found.`);

                    const dbPhone = String(allowedData.phone).replace(/\s+/g, '');
                    const dbPass = String(allowedData.password).trim();

                    if (dbPhone !== cleanPhone || dbPass !== cleanPass) throw new Error("Phone number or password does not match.");

                    const hiddenEmail = `${cleanCode.toLowerCase()}@rde.supremacyedu.com`;
                    let { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email: hiddenEmail, password: cleanPass });

                    if (authError && authError.message.includes("Invalid login")) {
                        msg.innerText = "Setting up secure session...";
                        const { data: signUpData, error: signErr } = await supabase.auth.signUp({ email: hiddenEmail, password: cleanPass });
                        if (signErr) throw signErr;
                        authData = signUpData;
                    } else if (authError) throw authError;

                    const { data: existing } = await supabase.from('rdes').select('id').eq('id', authData.user.id).maybeSingle();
                    if (!existing) {
                        const { error: insertErr } = await supabase.from('rdes').insert([{ id: authData.user.id, name: "RDE User", phone: cleanPhone }]);
                        if (insertErr) throw new Error("Profile creation blocked.");
                    }

                    window.location.href = "dashboard-rde.html"; 
                }
            } catch (err) {
                msg.style.backgroundColor = "var(--error-bg)";
                msg.style.color = "var(--error-text)"; 
                msg.innerText = err.message;
            }
        };
    </script>
</body>
</html>
