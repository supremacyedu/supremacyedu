<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supremacy Edu - Referrer Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="signup-card">
        <a href="index.html" class="back-btn" style="margin-bottom: 25px;">&larr; Back to Website</a>

        <h2>Create Account</h2>
        <p>Join the Supremacy Edu Platform</p>

        <form id="signup-form">
            <div class="input-group"><input type="text" id="reg-name" placeholder="Full Name" required></div>
            <div class="input-group"><input type="tel" id="reg-phone" placeholder="Phone Number" required></div>
            <div class="input-group"><input type="email" id="reg-email" placeholder="Email Address" required></div>
            
            <div class="input-group"><input type="text" id="regRdeCode" placeholder="RDE Code (e.g., RDE001A)" required></div>
            <div class="input-group"><input type="password" id="reg-pass" placeholder="Create Password" required></div>
            
            <div class="options" style="gap: 10px;">
                <input type="checkbox" id="agree-tc" required>
                <label for="agree-tc">I agree to the <a href="#" style="color: var(--primary); text-decoration: none;">Terms & Conditions</a></label>
            </div>
            
            <button type="submit" class="primary-btn">Sign Up</button>
        </form>

        <div id="message" style="margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none;"></div>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Log in here</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://dlszqasvqubjujkowrtl.supabase.co', 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM');

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            msg.style.display = "block";
            msg.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
            msg.style.color = "#38bdf8"; 
            msg.innerText = "Creating your account...";

            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const rdeCode = document.getElementById('regRdeCode').value.trim();
            const password = document.getElementById('reg-pass').value;

            try {
                // 1. Verify the RDE Code actually exists before letting them sign up
                const { data: validRde, error: rdeErr } = await supabase
                    .from('allowed_rdes')
                    .select('rde_code')
                    .ilike('rde_code', rdeCode)
                    .single();

                if (!validRde) throw new Error(`Invalid RDE Code: ${rdeCode}. Please check with your referrer.`);

                // 2. Create the Auth Account
                const { data: authData, error: authErr } = await supabase.auth.signUp({ email, password });
                if (authErr) throw authErr;

                // 3. Save to the new 'users' table with pending status
                const { error: insertErr } = await supabase.from('users').insert([{
                    id: authData.user.id,
                    name: name,
                    phone: phone,
                    email: email,
                    rde_code_used: validRde.rde_code, 
                    payment_status: 'pending' 
                }]);

                if (insertErr) throw insertErr;

                msg.style.backgroundColor = "rgba(74, 222, 128, 0.1)";
                msg.style.color = "#4ade80"; // Green
                msg.innerText = "Account created! Redirecting to dashboard...";
                
                setTimeout(() => { window.location.href = "login.html"; }, 1500);

            } catch (err) {
                msg.style.backgroundColor = "var(--error-bg)";
                msg.style.color = "var(--error-text)"; // Red
                msg.innerText = err.message;
            }
        });
    </script>
</body>
</html>
