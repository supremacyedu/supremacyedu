<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supremacy Edu - Referrer Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="signup-card">
        <a href="index.html" class="back-btn" style="margin-bottom: 25px;">&larr; Back to Website</a>

        <h2>Create Account</h2>
        <p>Join the Supremacy Edu Platform</p>

        <form id="signup-form">
            <div class="input-group"><input type="text" id="reg-name" placeholder="Full Name" required></div>
            <div class="input-group"><input type="tel" id="reg-phone" placeholder="Phone Number" required></div>
            <div class="input-group"><input type="email" id="reg-email" placeholder="Email Address" required></div>
            
            <div class="input-group"><input type="text" id="regRdeCode" placeholder="RDE Code (e.g., RDE001A)" required></div>
            <div class="input-group"><input type="password" id="reg-pass" placeholder="Create Password" required></div>
            
            <div class="options" style="margin-bottom: 20px;">
                <input type="checkbox" id="agree-tc" required>
                <label for="agree-tc" style="margin-left: 10px;">
                    I agree to the <a href="terms-ref.html" target="_blank" style="color: #38bdf8; text-decoration: none;">Terms & Conditions</a>
                </label>
            </div>
            
            <button type="submit" class="primary-btn">Sign Up</button>
        </form>

        <div id="message" style="margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none;"></div>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Log in here</a>
        </div>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://dlszqasvqubjujkowrtl.supabase.co', 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM');

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('message');
        msg.style.display = "block";
        msg.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
        msg.style.color = "#38bdf8"; 
        msg.innerText = "Creating your account...";

        const name = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const rdeCode = document.getElementById('regRdeCode').value.trim();
        const password = document.getElementById('reg-pass').value;

        try {
            // 1. Create the Auth Account 
            const { data: authData, error: authErr } = await supabase.auth.signUp({ 
                email, 
                password 
            });
            
            if (authErr) throw authErr;

            // NEW: Detect the Supabase "Fake User" Security Feature
            if (authData.user && authData.user.identities && authData.user.identities.length === 0) {
                throw new Error("This email is already registered. Please log in.");
            }

            msg.innerText = "Saving profile details...";

            // 2. FORCE INSERT INTO THE DATABASE DIRECTLY
            const { error: dbErr } = await supabase.from('referrers').insert([
                {
                    id: authData.user.id,
                    name: name,
                    phone: phone,
                    referred_by_rde: rdeCode,
                    payment_status: 'unpaid'
                }
            ]);

            if (dbErr) throw new Error(dbErr.message);

            // 3. Success!
            msg.style.backgroundColor = "rgba(74, 222, 128, 0.1)";
            msg.style.color = "#4ade80"; 
            msg.innerText = "Account fully created! Redirecting to login...";
            
            setTimeout(() => { window.location.href = "login.html"; }, 1500);

        } catch (err) {
            msg.style.backgroundColor = "rgba(248, 113, 113, 0.1)"; 
            msg.style.color = "#f87171"; 
            msg.innerText = err.message; // Will now cleanly say "Email already registered"
        }
    });
</script>
</body>
</html>
