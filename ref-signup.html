<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supremacy Edu - Referrer Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="auth-card" id="signup-section">
        <h2>Become a Referrer</h2>
        <p>Join the network and earn commissions.</p>
        <form id="signup-form">
            <div class="input-group"><input type="text" id="fullName" placeholder="Full Name" required /></div>
            <div class="input-group"><input type="tel" id="phone1" placeholder="Phone 1" required /></div>
            <div class="input-group"><input type="tel" id="phone2" placeholder="Phone 2 (Optional)" /></div>
            <div class="input-group"><input type="email" id="email" placeholder="Email Address" required /></div>
            <div class="input-group"><input type="text" id="rdeCode" placeholder="RDE Code (Mandatory)" required style="text-transform: uppercase;" /></div>
            <div class="input-group"><input type="text" id="refCode" placeholder="REF Code (Optional)" style="text-transform: uppercase;" /></div>
            <div class="input-group"><input type="password" id="password" placeholder="Password" required /></div>
            
            <button type="submit" class="primary-btn">Create Account</button>
        </form>
        <div class="auth-link-container">
            Already have an account? <a href="ref-login.html">Log in</a>
        </div>
    </div>

    <div class="auth-card" id="otp-section" style="display: none;">
        <h2>Verify Your Email</h2>
        <p>We sent a 6-digit OTP to your email address.</p>
        <form id="otp-form">
            <div class="input-group"><input type="text" id="otpToken" placeholder="Enter 6-digit OTP" required /></div>
            <button type="submit" class="primary-btn">Verify & Continue</button>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabaseUrl = 'https://dlszqasvqubjujkowrtl.supabase.co';
        const supabaseKey = 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const signupForm = document.getElementById('signup-form');
        const otpForm = document.getElementById('otp-form');
        let userEmail = '';

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            userEmail = document.getElementById('email').value;
            
            // Trigger Supabase Signup with custom user metadata
            const { data, error } = await supabase.auth.signUp({
                email: userEmail,
                password: document.getElementById('password').value,
                options: {
                    data: {
                        full_name: document.getElementById('fullName').value,
                        phone_1: document.getElementById('phone1').value,
                        phone_2: document.getElementById('phone2').value,
                        rde_code: document.getElementById('rdeCode').value.toUpperCase(),
                        entered_ref_code: document.getElementById('refCode').value.toUpperCase()
                    }
                }
            });

            if (error) {
                alert(error.message);
                return;
            }

            // Swap UI to OTP input
            document.getElementById('signup-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
        });

        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('otpToken').value;

            // Verify Email OTP
            const { data, error } = await supabase.auth.verifyOtp({
                email: userEmail,
                token: token,
                type: 'signup'
            });

           if (error) {
        alert(error.message); // Consider changing this to an inline error message later!
        return;
    }
    
    // 4. Success! Show themed confirmation, then redirect
    const otpSection = document.getElementById('otp-section');
    otpSection.innerHTML = `
        <div style="text-align: center; padding: 20px 0; animation: slideUpFade 0.5s forwards;">
            <div style="background: rgba(74, 222, 128, 0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 style="color: white; margin-bottom: 10px; font-size: 24px;">Verification Complete!</h2>
            <p style="color: var(--text-muted);">Your email has been verified. Redirecting to login...</p>
        </div>
    `;

    // Wait 2 seconds so they can see the success message, then route to login
    setTimeout(() => {
        window.location.href = 'ref-login.html';
    }, 2000);
        });
    </script>
</body>
</html>
