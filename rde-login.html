<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Careers - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="login-card">
        <a href="career.html" class="back-btn" style="margin-bottom: 25px;">&larr; Back to Careers</a>

        <h2>Candidate Login</h2>
        <p>Access your application portal.</p>

        <form id="candidate-login-form">
            <div class="input-group"><input type="email" id="log-email" placeholder="Email Address" required></div>
            <div class="input-group"><input type="password" id="log-pass" placeholder="Password" required></div>
            
            <button type="submit" class="primary-btn" id="login-btn">Log In</button>
        </form>

        <div id="message" style="margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none;"></div>
        
        <div class="login-link">
            New candidate? <a href="rde-signup.html">Register here</a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://dlszqasvqubjujkowrtl.supabase.co', 'sb_publishable_er7TxyaoL2bTTUAKKEplfA_vj5IHVxM');

        document.getElementById('candidate-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('message');
            const btn = document.getElementById('login-btn');
            
            msg.style.display = "block";
            msg.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
            msg.style.color = "#38bdf8"; 
            msg.innerText = "Authenticating...";
            btn.disabled = true;

            const email = document.getElementById('log-email').value.trim();
            const password = document.getElementById('log-pass').value;

            try {
                // 1. Authenticate
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });
                if (authError) throw new Error("Invalid email or password.");

                const userId = authData.user.id;

                // 2. Fetch from the unified 'rdes' table
                const { data: appProfile, error: profileError } = await supabase
                    .from('rdes')
                    .select('*')
                    .eq('id', userId)
                    .maybeSingle(); 

                if (!appProfile) {
                    throw new Error("No RDE application found. Please register first.");
                }

                msg.style.backgroundColor = "rgba(74, 222, 128, 0.1)";
                msg.style.color = "#4ade80"; 
                msg.innerText = "Login successful! Routing...";

                // 3. Routing Logic based on Document Uploads
                if (!appProfile.id_proof_url) {
                    setTimeout(() => { window.location.href = "rde-form.html"; }, 1000);
                } else {
                    setTimeout(() => { window.location.href = "rde-dashboard.html"; }, 1000);
                }

            } catch (err) {
                msg.style.backgroundColor = "var(--error-bg)";
                msg.style.color = "var(--error-text)"; 
                msg.innerText = err.message;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
